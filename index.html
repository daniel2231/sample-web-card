<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shinwoo Global - Digital Business Card</title>
    <!-- Google Fonts: Noto Sans KR for professional look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <!-- Ionicons for beautiful simple icons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <div class="logo-container">
            <img src="./images/Logo-SGI.svg" alt="Shinwoo Global" class="loader-img">
        </div>
    </div>

    <!-- Main Container -->
    <div class="wrapper">
        <div class="card" id="business-card">
            
            <div class="card-inner">
                <!-- Company Header (Stands Out at Top) -->
                <div class="company-header">
                    <h2 class="top-company-name" data-ko="신우 글로벌" data-en="SHINWOO GLOBAL">신우 글로벌</h2>
                </div>

                <!-- Language Toggle -->
                <div class="lang-toggle">
                    <button id="btn-ko" class="active">KR</button>
                    <button id="btn-en">EN</button>
                </div>

                <!-- Profile Image / Avatar -->
                <div class="avatar-container">
                    <img src="https://images.unsplash.com/photo-1560250097-0b93528c311a?ixlib=rb-4.0.3&auto=format&fit=crop&w=300&q=80" alt="Profile" class="avatar">
                </div>
                
                <!-- Info Section -->
                <div class="info">
                    <h1 class="name" data-ko="김서진" data-en="Seojin Kim">김서진</h1>
                    <p class="title" data-ko="영업 대표 | 영업팀" data-en="Sales Representative">영업 대표 | 영업팀</p>
                    <!-- Logo removed from body as requested -->
                </div>
                
                <!-- Contact Info Section -->
                <div class="contact-details">
                    <div class="detail-item">
                        <ion-icon name="call-outline"></ion-icon>
                        <span>+62 21-1234-5678</span>
                    </div>
                    <div class="detail-item">
                        <ion-icon name="mail-outline"></ion-icon>
                        <span>sales@shinwoo-global.com</span>
                    </div>
                    <div class="detail-item">
                        <ion-icon name="globe-outline"></ion-icon>
                        <a href="http://shinwoo-global.com" target="_blank">shinwoo-global.com</a>
                    </div>
                </div>

                <!-- Contact Action -->
                <div class="actions">
                    <a href="mailto:sales@shinwoo-global.com" class="btn primary-btn">
                        <ion-icon name="paper-plane-outline"></ion-icon>
                        <span data-ko="이메일 보내기" data-en="Send Email">이메일 보내기</span>
                    </a>
                </div>
            </div>

            <!-- Card Shine Effect (for 3D interaction) -->
            <div class="shine"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
